// ── HELPERS ──────────────────────────────────────────────────────────────────
function fmt(v, dec=0) { return v == null ? "—" : Number(v).toLocaleString('en-US', {minimumFractionDigits:dec, maximumFractionDigits:dec}); }
function fmtSign(v, suf="") { if(v==null) return "—"; return (v>0?"+":"")+v+suf; }

function delta(val, suf="", inv=false) {
  if(val==null||val===undefined) return `<span class="delta-nt">—</span>`;
  const up = inv ? val<0 : val>0;
  const neutral = val===0;
  const cls = neutral ? "delta-nt" : up ? "delta-up" : "delta-dn";
  const arr = val>0?"↑":val<0?"↓":"→";
  return `<span class="${cls}">${arr} ${Math.abs(val)}${suf}</span>`;
}

function statusBadge(status) {
  const cls = "status-"+status.toLowerCase();
  return `<span class="${cls}">${status}</span>`;
}

function getSurvey(monthIdx) {
  const c = SURVEYS.filter(s => s.monthIdx <= monthIdx);
  return c.length ? c[c.length-1] : null;
}
function getStaleness(surveyIdx, curIdx) {
  const m = curIdx - surveyIdx;
  return m<=1?"fresh":m<=3?"amber":"stale";
}

// ── SIGNAL STATUS LOGIC ──────────────────────────────────────────────────────
function calcDimStatus(dimId, d, prev) {
  if(dimId==="search") {
    const deltas=[d.impressionsDelta,d.clicksDelta,d.trendsIdxDelta].filter(x=>x!=null);
    const pos=deltas.filter(x=>x>0).length, neg=deltas.filter(x=>x<0).length;
    if(d.risingTide) return {status:"Watch",
      headline:`Trends index ${d.trendsIdx}/100 but category rising in parallel`,
      factors:[
        {label:"Branded impressions",val:`${(d.impressionsDelta>0?"+":"")+d.impressionsDelta}%`,positive:d.impressionsDelta>0},
        {label:"Google Trends index",val:`${d.trendsIdx}/100`,positive:(d.trendsIdxDelta||0)>=0},
        {label:"Category context",val:"Rising tide detected",positive:false,note:"Category rising alongside brand — gains may not be brand-specific"}
      ],
      method:"Watch applied when category index moves in the same direction as brand, reducing confidence that gains are brand-driven."};
    if(pos>=2) return {status:"Improving",
      headline:`Branded impressions ${(d.impressionsDelta>0?"+":"")+d.impressionsDelta}%, Trends index ${d.trendsIdx}/100`,
      factors:[
        {label:"Branded impressions",val:`${(d.impressionsDelta>0?"+":"")+d.impressionsDelta}% MoM`,positive:d.impressionsDelta>0},
        {label:"Branded clicks",val:`${(d.clicksDelta>0?"+":"")+d.clicksDelta}% MoM`,positive:d.clicksDelta>0},
        {label:"Avg position",val:`${d.position}`,positive:(d.positionDelta||0)<=0,note:"Lower = better ranking"},
        {label:"Google Trends index",val:`${d.trendsIdx}/100`,positive:(d.trendsIdxDelta||0)>=0}
      ],
      method:"Improving = majority of branded impressions, clicks, and Trends index moving positively MoM."};
    if(neg>=2) return {status:"Declining",
      headline:`Branded impressions ${d.impressionsDelta}%, Trends index ${d.trendsIdx}/100`,
      factors:[
        {label:"Branded impressions",val:`${d.impressionsDelta}% MoM`,positive:false},
        {label:"Branded clicks",val:`${d.clicksDelta}% MoM`,positive:false},
        {label:"Google Trends index",val:`${d.trendsIdx}/100`,positive:(d.trendsIdxDelta||0)>=0}
      ],
      method:"Declining = majority of branded impressions, clicks, and Trends index moving negatively MoM."};
    return {status:"Stable",
      headline:`Branded impressions ${(d.impressionsDelta>0?"+":"")+d.impressionsDelta}%, Trends index ${d.trendsIdx}/100`,
      factors:[
        {label:"Branded impressions",val:`${(d.impressionsDelta>0?"+":"")+d.impressionsDelta}% MoM`,positive:d.impressionsDelta>0},
        {label:"Branded clicks",val:`${(d.clicksDelta>0?"+":"")+d.clicksDelta}% MoM`,positive:d.clicksDelta>0},
        {label:"Google Trends index",val:`${d.trendsIdx}/100`,positive:(d.trendsIdxDelta||0)>=0}
      ],
      method:"Stable = mixed or flat signals with no clear directional trend."};
  }
  if(dimId==="digital") {
    const pos=[d.directPctDelta,d.brandedOrganicDelta].filter(x=>x!=null&&x>0).length;
    const neg=[d.directPctDelta,d.brandedOrganicDelta].filter(x=>x!=null&&x<0).length;
    const status=pos>=2?"Improving":neg>=2?"Declining":"Stable";
    return {status,
      headline:`Direct traffic ${d.directPct}% of sessions, branded organic split ${d.brandedOrganic}%`,
      factors:[
        {label:"Direct sessions",val:d.directSessionsDelta!=null?`${(d.directSessionsDelta>0?"+":"")+d.directSessionsDelta}%`:"--",positive:(d.directSessionsDelta||0)>=0},
        {label:"Direct % of total",val:`${d.directPct}%`,positive:(d.directPctDelta||0)>=0},
        {label:"Total organic sessions",val:d.organicSessionsDelta!=null?`${(d.organicSessionsDelta>0?"+":"")+d.organicSessionsDelta}%`:"--",positive:(d.organicSessionsDelta||0)>=0},
        {label:"Branded organic split",val:`${d.brandedOrganic}%`,positive:(d.brandedOrganicDelta||0)>=0}
      ],
      method:"Status from MoM direction of direct traffic % and branded organic split. These most directly reflect brand recall."};
  }
  if(dimId==="social") {
    if(!d.followerGrowthRate) return null;
    const erD=d.engagementRateDelta||0, grD=d.followerGrowthRateDelta||0;
    const status=erD>0&&grD>=0?"Improving":erD<0&&grD<0?"Declining":(erD<0||grD<0)?"Watch":"Stable";
    return {status,
      headline:`Engagement rate ${d.engagementRate}%, follower growth ${d.followerGrowthRate}% MoM`,
      factors:[
        {label:"Follower growth rate",val:`${d.followerGrowthRate}% MoM`,positive:grD>=0},
        {label:"Net follower growth",val:`+${d.netFollowerGrowth!=null?d.netFollowerGrowth.toLocaleString():"--"}`,positive:true},
        {label:"Organic reach",val:`${d.reach}K`,positive:true},
        {label:"Engagement rate",val:`${d.engagementRate}%`,positive:erD>=0,note:erD<0?"Declining engagement — watch audience quality":""}
      ],
      method:"Primary: engagement rate MoM. Secondary: follower growth rate. Engagement weighted higher as it reflects active audience interest."};
  }
  if(dimId==="competitive") {
    const shareD=d.brandShareDelta||0;
    const gapNow=d.kgTrends-Math.max(d.smTrends,d.carTrends,d.tedTrends);
    const gapPrev=prev?prev.kgTrends-Math.max(prev.smTrends,prev.carTrends,prev.tedTrends):gapNow;
    const gapChg=gapNow-gapPrev;
    const status=shareD>=2?"Improving":shareD<=-3?"Declining":gapChg<-3?"Watch":"Stable";
    return {status,
      headline:`#1 position, ${d.brandShare}% share of branded search, Trends index ${d.kgTrends}`,
      factors:[
        {label:"Trends index (Kurt Geiger)",val:`${d.kgTrends}/100`,positive:(d.trendsIdxDelta||0)>=0},
        {label:"Gap to Steve Madden",val:`${d.kgTrends-d.smTrends} pts`,positive:gapChg>=0,note:gapChg<0?"Gap narrowing — competitor closing":""},
        {label:"Share of branded search",val:`${d.brandShare}%`,positive:shareD>=0},
        {label:"Brand Trends index MoM",val:d.trendsIdxDelta!=null?`${(d.trendsIdxDelta>0?"+":"")+d.trendsIdxDelta}%`:"--",positive:(d.trendsIdxDelta||0)>=0}
      ],
      method:"Primary: MoM change in share of branded search. Secondary: gap to nearest competitor Trends index."};
  }
  if(dimId==="listening") {
    if(!d.mentionVol) return null;
    const volUp=(d.mentionVolDelta||0)>0, sentUp=(d.sentimentDelta||0)>=0;
    const status=volUp&&sentUp?"Improving":volUp&&!sentUp?"Watch":!volUp&&!sentUp?"Declining":"Stable";
    return {status,
      headline:`${d.mentionVol.toLocaleString()} mentions, ${d.sentimentPct}% positive, ${d.sov}% SOV`,
      factors:[
        {label:"Mention volume",val:d.mentionVolDelta!=null?`${(d.mentionVolDelta>0?"+":"")+d.mentionVolDelta}%`:"--",positive:(d.mentionVolDelta||0)>=0},
        {label:"Sentiment % positive",val:`${d.sentimentPct}%`,positive:(d.sentimentDelta||0)>=0,note:(d.sentimentDelta||0)<0?"Volume growing but sentiment declining — watch conversation quality":""},
        {label:"Share of voice",val:`${d.sov}%`,positive:(d.sovDelta||0)>=0},
        {label:"Earned reach",val:`${d.earnedReach!=null?d.earnedReach.toLocaleString():"--"}K`,positive:true}
      ],
      method:"Improving = mention volume up AND sentiment holding or improving. Watch = volume up but sentiment declining — growth without quality is a flag."};
  }
  if(dimId==="paid") {
    if(!d.brandedCpmGoogle) return null;
    const cpmDown=(d.cpmGoogleDelta||0)<0, isUp=(d.impressionShareDelta||0)>0;
    const status=cpmDown&&isUp?"Improving":!cpmDown&&!isUp?"Watch":"Stable";
    return {status,
      headline:`Google CPM $${d.brandedCpmGoogle}, impression share ${d.impressionShare}%`,
      factors:[
        {label:"Branded CPM (Google Ads)",val:`$${d.brandedCpmGoogle}`,positive:(d.cpmGoogleDelta||0)<=0,note:"Lower CPM = more efficient branded spend"},
        {label:"Branded CPM (Meta)",val:`$${d.brandedCpmMeta}`,positive:(d.cpmMetaDelta||0)<=0},
        {label:"Search impression share",val:`${d.impressionShare}%`,positive:(d.impressionShareDelta||0)>=0},
        {label:"Branded paid CTR",val:`${d.paidCtr}%`,positive:(d.paidCtrDelta||0)>=0}
      ],
      method:"Status from CPM trend direction (primary) and impression share (secondary). Rising CPM flags either increased demand or competitor pressure."};
  }
  return null;
}
// ── SVG SPARKLINE (BVI trend) ─────────────────────────────────────────────────
function sparklineSVG(w, h, curIdx) {
  const minV=38, maxV=78, n=RAW.length;
  const xp = i => 2+(i/(n-1))*(w-4);
  const yp = v => 3+(1-(v-minV)/(maxV-minV))*(h-6);
  const catPts = CAT_TRENDS.map((v,i)=>`${xp(i).toFixed(1)},${yp(v).toFixed(1)}`).join(" ");
  const bfPts = RAW.map((m,i)=>m.status==="backfill"?`${xp(i).toFixed(1)},${yp(m.bvi).toFixed(1)}`:null).filter(Boolean).join(" ");
  const lvPts = RAW.map((m,i)=>m.status==="live"?`${xp(i).toFixed(1)},${yp(m.bvi).toFixed(1)}`:null).filter(Boolean).join(" ");
  const cx=xp(curIdx), cy=yp(RAW[curIdx].bvi);
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <polyline points="${catPts}" fill="none" stroke="${B.lightPurple}" stroke-width="1" opacity="0.4" stroke-dasharray="2,3"/>
    ${bfPts?`<polyline points="${bfPts}" fill="none" stroke="${B.lightPurple}" stroke-width="1.5" stroke-dasharray="4,3"/>`:""}
    ${lvPts?`<polyline points="${lvPts}" fill="none" stroke="${B.offWhite}" stroke-width="2"/>`:""}
    <circle cx="${cx}" cy="${cy}" r="3.5" fill="${B.offWhite}"/>
  </svg>`;
}

// ── TREND CHART (main 12-month) ───────────────────────────────────────────────
function trendChartSVG(curIdx) {
  const W=620, H=170, pad={l:32,r:12,t:14,b:22}, minV=38, maxV=78, n=RAW.length;
  const xp = i => pad.l+(i/(n-1))*(W-pad.l-pad.r);
  const yp = v => pad.t+(1-(v-minV)/(maxV-minV))*(H-pad.t-pad.b);
  const bfIdx = RAW.map((m,i)=>m.status==="backfill"?i:null).filter(x=>x!==null);
  const lvIdx = RAW.map((m,i)=>m.status==="live"?i:null).filter(x=>x!==null);
  const joinIdx = RAW.findIndex(m=>m.status==="live");
  const catPts = CAT_TRENDS.map((v,i)=>`${xp(i).toFixed(1)},${yp(v).toFixed(1)}`).join(" ");
  const bfPts = bfIdx.map(i=>`${xp(i).toFixed(1)},${yp(RAW[i].bvi).toFixed(1)}`).join(" ");
  const lvPts = lvIdx.map(i=>`${xp(i).toFixed(1)},${yp(RAW[i].bvi).toFixed(1)}`).join(" ");
  const cx=xp(curIdx), cy=yp(RAW[curIdx].bvi);
  const gridLines = [45,55,65].map(v=>`
    <line x1="${pad.l}" y1="${yp(v)}" x2="${W-pad.r}" y2="${yp(v)}" stroke="${B.gray}" stroke-width="0.5" opacity="0.25"/>
    <text x="${pad.l-5}" y="${yp(v)+3.5}" font-size="9" fill="${B.gray}" text-anchor="end" font-family="'Darker Grotesque',Arial,sans-serif">${v}</text>`).join("");
  const labels = RAW.map((m,i)=>`<text x="${xp(i)}" y="${H-4}" font-size="9" fill="${i===curIdx?B.purple:B.gray}" text-anchor="middle" font-family="'Darker Grotesque',Arial,sans-serif" font-weight="${i===curIdx?700:400}">${MONTHS[i]}</text>`).join("");
  const risingRing = RAW[curIdx].risingTide ? `<circle cx="${cx}" cy="${cy}" r="7" fill="none" stroke="${B.yellow}" stroke-width="2" opacity="0.7"/>` : "";
  const joinLine = joinIdx>0 ? `<line x1="${xp(joinIdx-1)}" y1="${yp(RAW[joinIdx-1].bvi)}" x2="${xp(joinIdx)}" y2="${yp(RAW[joinIdx].bvi)}" stroke="${B.purple}" stroke-width="1.5" stroke-dasharray="2,2"/>` : "";
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block">
    ${gridLines}
    <polyline points="${catPts}" fill="none" stroke="${B.gray}" stroke-width="1.5" stroke-dasharray="3,4" opacity="0.6"/>
    ${bfPts?`<polyline points="${bfPts}" fill="none" stroke="${B.lightPurple}" stroke-width="2" stroke-dasharray="5,3"/>`:""}
    ${joinLine}
    ${lvPts?`<polyline points="${lvPts}" fill="none" stroke="${B.purple}" stroke-width="2.5"/>`:""}
    ${risingRing}
    <circle cx="${cx}" cy="${cy}" r="4.5" fill="${B.purple}"/>
    <circle cx="${cx}" cy="${cy}" r="2.5" fill="${B.offWhite}"/>
    ${labels}
  </svg>`;
}

// ── METRIC CARD ───────────────────────────────────────────────────────────────
function metricCard(label, value, dval, dsuf="", inv=false, tip="", sub="") {
  return `<div class="card">
    <div class="label" style="display:flex;align-items:center;gap:4px;margin-bottom:5px">${label}${tip?`<span title="${tip}" style="width:14px;height:14px;border-radius:50%;background:rgba(171,171,171,.25);display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:#ABABAB;cursor:help;font-weight:700">?</span>`:""}
    </div>

}

const STATUS_CFG = {
  Improving:{color:"#0F6E56",bg:"#E1F5EE",border:"#5DCAA5"},
  Stable:   {color:"#5F5E5A",bg:"#F1EFE8",border:"#B4B2A9"},
  Declining:{color:"#C0392B",bg:"#FDECEA",border:"#F09595"},
  Watch:    {color:"#BA7517",bg:"#FAF0DA",border:"#FAC775"},
};

function dimRow(name, dimId, d, prev, tier, locked) {
  const dotColor = tier==="base"?B.nearBlack:tier==="silver"?B.lightPurple:B.yellow;
  const tierTag = tier==="silver"
    ? `<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:#F5F5F5;color:#ABABAB;border:0.5px solid rgba(171,171,171,.4);text-transform:uppercase;letter-spacing:.04em;margin-left:4px">Silver</span>`
    : tier==="gold"
    ? `<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:#F5F5F5;color:#ABABAB;border:0.5px solid rgba(171,171,171,.4);text-transform:uppercase;letter-spacing:.04em;margin-left:4px">Gold</span>`
    : "";

  if(locked) return `<div class="dim-row" style="opacity:.38">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0">
      <div style="display:flex;align-items:center;gap:7px">
        <div style="width:6px;height:6px;border-radius:50%;background:${dotColor}"></div>
        <span style="font-size:12px">${name}</span>${tierTag}
      </div>
      <span style="font-size:11px;color:#ABABAB">--</span>
    </div></div>`;

  const info = calcDimStatus(dimId, d, prev);
  if(!info) return `<div class="dim-row" style="opacity:.38">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0">
      <div style="display:flex;align-items:center;gap:7px">
        <div style="width:6px;height:6px;border-radius:50%;background:${dotColor}"></div>
        <span style="font-size:12px">${name}</span>
      </div>
      <span style="font-size:11px;color:#ABABAB">No data</span>
    </div></div>`;

  const isExpanded = state.expandedDims[dimId];
  const sc = STATUS_CFG[info.status] || STATUS_CFG.Stable;
  const factors = info.factors || [];
  const method = info.method || "";

  const factorRows = factors.map(f => `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid rgba(171,171,171,.2)">
      <div style="flex:1">
        <span style="font-size:11px">${f.label}</span>
        ${f.note ? `<div style="font-size:10px;color:#ABABAB;margin-top:1px">${f.note}</div>` : ""}
      </div>
      <span style="font-size:11px;font-weight:700;color:${f.positive?"#0F6E56":"#C0392B"};margin-left:12px;flex-shrink:0">${f.val}</span>
    </div>`).join("");

  const expandPanel = isExpanded ? `
    <div style="margin-bottom:10px;background:#F5F5F5;border-radius:7px;padding:12px 14px">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#ABABAB;margin-bottom:8px">Contributing factors</div>
      ${factorRows}

}

function renderCategory(d, idx) {
  const gap = d.kgTrends - d.catTrends;
  const prev = idx>0?RAW[idx-1]:null;
  const catD = prev?d.catTrends-prev.catTrends:null;
  const gapD = prev?(gap-(prev.kgTrends-prev.catTrends)):null;
  const W=580,H=130,pad={l:28,r:8,t:10,b:22},minV=35,maxV=75,n=RAW.length;
  const xp=i=>pad.l+(i/(n-1))*(W-pad.l-pad.r);
  const yp=v=>pad.t+(1-(v-minV)/(maxV-minV))*(H-pad.t-pad.b);
  const labels=RAW.map((m,i)=>`<text x="${xp(i)}" y="${H-4}" font-size="8" fill="${i===idx?B.purple:B.gray}" text-anchor="middle" font-family="'Darker Grotesque',Arial,sans-serif" font-weight="${i===idx?700:400}">${MONTHS[i]}</text>`).join("");
  const catChart = `<svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block">
    ${[40,50,60,70].map(v=>`<line x1="${pad.l}" y1="${yp(v)}" x2="${W-pad.r}" y2="${yp(v)}" stroke="${B.gray}" stroke-width="0.5" opacity="0.2"/><text x="${pad.l-4}" y="${yp(v)+3}" font-size="8" fill="${B.gray}" text-anchor="end" font-family="'Darker Grotesque',Arial,sans-serif">${v}</text>`).join("")}
    <polyline points="${CAT_TRENDS3.map((v,i)=>`${xp(i).toFixed(1)},${yp(v).toFixed(1)}`).join(" ")}" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="2,4"/>
    <polyline points="${CAT_TRENDS2.map((v,i)=>`${xp(i).toFixed(1)},${yp(v).toFixed(1)}`).join(" ")}" fill="none" stroke="${B.lightPurple}" stroke-width="1" stroke-dasharray="2,3"/>
    <polyline points="${RAW.map((m,i)=>`${xp(i).toFixed(1)},${yp(m.catTrends).toFixed(1)}`).join(" ")}" fill="none" stroke="${B.gray}" stroke-width="1.5" stroke-dasharray="3,3"/>
    <polyline points="${RAW.map((m,i)=>`${xp(i).toFixed(1)},${yp(m.kgTrends).toFixed(1)}`).join(" ")}" fill="none" stroke="${B.purple}" stroke-width="2.5"/>
    <circle cx="${xp(idx)}" cy="${yp(RAW[idx].kgTrends)}" r="4" fill="${B.purple}"/>
    <circle cx="${xp(idx)}" cy="${yp(RAW[idx].catTrends)}" r="3" fill="${B.gray}"/>
    ${labels}
  </svg>`;
  return `<div>
    <div class="grid3" style="margin-bottom:14px">
      ${metricCard(`Trends index — "women's shoes"`,d.catTrends+"/100",catD," pts")}
      ${metricCard("Brand vs. category gap",(gap>0?"+":"")+gap+" pts",gapD," pts")}
      ${metricCard("Category keyword volume",d.catVol.toLocaleString()+"K",d.catVolDelta,"%")}
    </div>
    <div class="card" style="margin-bottom:12px">
      <div style="font-size:11px;font-weight:700;margin-bottom:2px">Brand vs. category — Google Trends Export 2</div>
      <div style="font-size:10px;color:#ABABAB;margin-bottom:10px">Kurt Geiger index vs. category terms</div>
      ${catChart}
      <div style="display:flex;flex-wrap:wrap;gap:14px;margin-top:8px">
        ${[{color:B.purple,bold:true,label:`Kurt Geiger (${d.kgTrends})`},{color:B.gray,bold:false,label:`"women's shoes" (${d.catTrends})`},{color:B.lightPurple,bold:false,label:`"luxury footwear" (${CAT_TRENDS2[idx]})`},{color:"#B4B2A9",bold:false,label:`"designer shoes" (${CAT_TRENDS3[idx]})`}].map(l=>`<div style="display:flex;align-items:center;gap:5px;font-size:10px;color:#ABABAB">
          <svg width="16" height="6"><line x1="0" y1="3" x2="16" y2="3" stroke="${l.color}" stroke-width="${l.bold?2.5:1.5}" stroke-dasharray="${l.bold?"none":"3,3"}"/></svg>
          <span style="font-weight:${l.bold?700:400};color:${l.bold?B.nearBlack:B.gray}">${l.label}</span>
        </div>`).join("")}
      </div>
    </div>
    <div style="background:${d.risingTide?"rgba(250,199,117,.12)":"rgba(225,245,238,.2)"};border:0.5px solid ${d.risingTide?"rgba(250,199,117,.5)":"rgba(93,202,165,.5)"};border-radius:8px;padding:12px 14px">
      <div style="font-size:11px;font-weight:700;margin-bottom:4px">${d.risingTide?"Rising-tide pattern detected this month":"No rising-tide pattern this month"}</div>
      <div style="font-size:12px;color:#ABABAB;line-height:1.6">${d.risingTide?`The "women's shoes" Trends index rose this month while brand metrics moved in the same direction. Some BVI movement reflects broader category momentum. Brand-vs-category gap ${gap>0?"remains positive at +"+gap+" pts":"has narrowed to "+gap+" pts"}.`:`The "women's shoes" index moved independently of brand metrics. BVI changes are primarily brand-driven. Brand outperforming category by ${gap} pts.`}</div>

function renderAwareness(idx) {
  const survey = getSurvey(idx);
  const prevSurvey = survey ? SURVEYS[SURVEYS.indexOf(survey)-1] : null;
  if(!survey) return `<div style="padding:32px 0;text-align:center"><div style="font-size:14px;font-weight:600;color:#ABABAB;margin-bottom:6px">No survey data yet</div><div style="font-size:12px;color:#ABABAB;line-height:1.6">Direct Awareness survey data begins with the first PDM-executed survey.</div></div>`;
  const staleness = getStaleness(survey.monthIdx, idx);
  const stalCfg = {fresh:{bg:B.greenBg,color:B.green,text:`Survey data · ${survey.date}`},amber:{bg:B.amberBg,color:B.amber,text:`Survey from ${survey.date} · refresh recommended`},stale:{bg:B.redBg,color:B.red,text:`Survey from ${survey.date} · overdue`}}[staleness];
  const metrics=[
    {label:"Unaided recall",val:survey.unaidedRecall,prev:prevSurvey?.unaidedRecall,note:"Q1: Name any footwear brands you can think of"},
    {label:"Aided awareness",val:survey.aidedAwareness,prev:prevSurvey?.aidedAwareness,note:"Q2: Recognition list shown to respondents"},
    {label:"Consideration",val:survey.consideration,prev:prevSurvey?.consideration,note:"Q3: Would you consider buying from this brand?"},
    {label:"Preference",val:survey.preference,prev:prevSurvey?.preference,note:"Q4: Which brand would be your first choice?"},
  ];
  return `<div>
    <div style="background:#F5F5F5;border:0.5px solid rgba(171,171,171,.3);border-radius:8px;padding:12px 16px;margin-bottom:14px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div>
          <div style="font-size:11px;font-weight:700;margin-bottom:6px">Survey metadata</div>
          <div style="display:flex;flex-wrap:wrap;gap:12px">
            ${[{l:"Source",v:"PDM Survey (Pollfish)"},{l:"Fielded",v:survey.fieldingDate},{l:"Sample",v:"n="+survey.sampleSize.toLocaleString()},{l:"Audience",v:survey.audienceType}].map(m=>`<div><div class="label">${m.l}</div><div style="font-size:12px;font-weight:600">${m.v}</div></div>`).join("")}
          </div>
        </div>
        <span style="font-size:10px;padding:2px 8px;border-radius:4px;background:${stalCfg.bg};color:${stalCfg.color};font-weight:600">${stalCfg.text}</span>
      </div>
    </div>
    <div class="grid4" style="margin-bottom:14px">
      ${metrics.map(m=>{
        const d2 = m.prev!=null ? m.val-m.prev : null;
        return `<div class="card">
          <div class="label" style="margin-bottom:5px">${m.label}</div>
          <div style="font-size:28px;font-weight:700;line-height:1">${m.val}%</div>
          <div style="margin-top:5px">${d2!=null?delta(d2," pts")+"<span style='font-size:10px;color:#ABABAB;margin-left:6px'>vs prior survey</span>":`<span style="font-size:10px;color:#ABABAB">First survey</span>`}</div>
          <div style="font-size:10px;color:#ABABAB;margin-top:6px;font-style:italic">${m.note}</div>
        </div>`;
      }).join("")}
    </div>
    <div class="card">
      <div style="font-size:11px;font-weight:700;margin-bottom:12px">Awareness funnel</div>
      ${metrics.map(m=>`<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px">${m.label}</span><span style="font-size:12px;font-weight:700">${m.val}%</span></div>
        <div style="height:8px;background:rgba(171,171,171,.2);border-radius:4px;overflow:hidden"><div style="height:100%;width:${m.val}%;background:#7756FF;border-radius:4px"></div></div>
      </div>`).join("")}
      <div style="font-size:11px;color:#ABABAB;margin-top:8px">Each stage = % of cold/prospective audience. Conversion from aided awareness (${survey.aidedAwareness}%) to consideration (${survey.consideration}%) is the key efficiency metric.</div>
    </div>
  </div>`;
}

const DIM_SPEC = {
  search:{name:"Search Demand",weight:"22% of BVI",sources:["Google Search Console (ZIP) — Chart.csv + Queries.csv","Google Trends Export 1 — brand vs. competitors"],principle:"All signals score on movement versus the brand's season-neutral baseline, never on absolute values. A brand with 10K impressions running 15% above baseline scores identically to one with 2M impressions running 15% above baseline.",signals:[{n:"Branded impressions vs baseline",w:"35%",s:"Standard % change",note:"How often your brand name appears in Google search results. Growing impressions mean more people are actively searching for your brand — one of the earliest and most reliable signals that awareness is expanding."},{n:"Branded clicks vs baseline",w:"25%",s:"Standard % change",note:"How often searchers click through after seeing a branded result. Growing clicks on top of growing impressions confirms awareness is converting into active interest, not just passive exposure."},{n:"Google Trends index vs baseline",w:"25%",s:"Standard % change",note:"Measures relative search interest in your brand over time, indexed to 100 at peak. A rising Trends index means more people are proactively seeking your brand — genuine curiosity, not ad-driven traffic."},{n:"Average position vs baseline",w:"15%",s:"Position change (inverse)",note:"Your average ranking when someone searches for your brand. Improving position means you appear higher more often, reinforcing name recognition and increasing the likelihood of a click with every future search."}],flags:["Rising tide modifier: ×0.90 on Trends signal if category growing alongside brand.","Large swing cap: any signal change >±40% is capped at the ±40% score value. Raw value still displayed."]},
  digital:{name:"Digital Presence",weight:"22% of BVI",sources:["GA4 Traffic Acquisition CSV — monthly date dimension"],principle:"Direct traffic share is the primary signal — it is size-agnostic and the clearest proxy for brand recall. Someone typing your URL knew you before they needed to search.",signals:[{n:"Direct sessions vs baseline",w:"30%",s:"Standard % change",note:"Visitors who typed your URL directly or used a saved bookmark — they already knew your brand before the visit. Growing direct traffic is one of the clearest proof points that awareness is translating into habitual, ad-free behavior."},{n:"Direct % of total sessions vs baseline",w:"40%",s:"Percentage point change",note:"The share of all traffic that arrived directly, not through ads or search. Growing share means more people recall your brand without a prompt. Weighted highest because it is size-independent — a 2-point share gain at 10K sessions shows stronger awareness momentum than flat share at 1M sessions."},{n:"Organic Search sessions vs baseline",w:"30%",s:"Standard % change",note:"Visitors who found you through unpaid search results. Organic growth without paid support signals genuine brand interest — people are searching for terms that lead to you, not just responding to a campaign."}],flags:["If GA4 not uploaded: dimension excluded entirely from BVI."]},
  social:{name:"Organic Social",weight:"14% of BVI",sources:["Instagram — manual entry via Meta Business Suite","TikTok — manual entry via TikTok Studio"],principle:"Engagement rate is weighted highest because reach and follower counts can be inflated by viral one-off content. Sustained engagement reflects genuine audience health.",signals:[{n:"Engagement rate vs baseline",w:"45%",s:"Percentage point change",note:"The percentage of people who saw your posts and actively responded — liked, commented, shared, or saved. Engagement reflects audience quality over quantity: a brand whose content consistently earns reactions has built a real community, not just a count."},{n:"Follower growth rate vs baseline",w:"30%",s:"Standard % change",note:"How quickly your audience is growing versus its season-neutral baseline, measured as a rate rather than raw count. Rate-based measurement is size-agnostic — 2% growth above baseline signals the same momentum whether you have 10K or 1M followers."},{n:"Organic reach vs baseline",w:"25%",s:"Standard % change",note:"The number of unique accounts who saw your unpaid posts. Growing organic reach means the platform is distributing your content more broadly — a sign your brand earns exposure through genuine engagement rather than paid amplification."}],flags:["If both platforms entered: signals averaged before scoring.","If one platform only: scored on that platform with SINGLE_PLATFORM_SOCIAL flag.","90-day native platform limit — data prior to ~3 months unavailable."]},
  competitive:{name:"Competitive Position",weight:"14% of BVI",sources:["Google Trends Export 1 — single comparative query with all brands"],principle:"Never score on absolute Trends index value. Score on share, share change, and gap change. A brand ranked #3 but improving rapidly is healthier than one ranked #1 but declining.",signals:[{n:"Brand Trends share vs baseline",w:"50%",s:"Percentage point change",note:"Your share of total search interest across all tracked brands in the category. When your share grows, consumers are shifting attention toward your brand relative to competitors — even in a flat market, share gains prove your brand is winning mindshare."},{n:"Gap to nearest competitor vs baseline",w:"30%",s:"Percentage point change",note:"The distance between your Trends index and the closest competitor's. A widening gap means you are pulling ahead of your nearest challenger. A narrowing gap is an early warning that a competitor may be accelerating spend or gaining cultural relevance."},{n:"Brand Trends index vs baseline",w:"20%",s:"Standard % change",note:"Your brand's absolute search interest level, used to confirm whether share gains reflect real growth or simply competitor decline. Share gains backed by a rising index confirm genuine momentum; share gains while your own index falls deserve closer review."}],flags:["Ordinal rank (#1, #2, etc.) is display context only — does not affect dimension score.","If Trends Export 1 not uploaded: dimension excluded entirely."]},
  category:{name:"Category Context",weight:"8% of BVI",sources:["Google Trends Export 2 — separate query: brand vs. category terms","SEMrush — category keyword volume (display only, not scored)"],principle:"Measures whether brand growth is brand-driven or riding a category-wide wave. Produces the Rising Tide flag that modifies Search Demand and Competitive Position scoring.",signals:[{n:"Brand vs. primary category term gap vs baseline",w:"60%",s:"Percentage point change",note:"The difference between your brand's search interest and the primary category keyword's. A widening positive gap means your brand is growing faster than the category itself — people are searching specifically for you, not just for the product type. This is the core signal of brand-led growth."},{n:"Brand Trends index vs baseline",w:"40%",s:"Standard % change",note:"Your brand's search interest from the category comparison query, used to determine whether growth is brand-driven or market-wide. When your index rises while the category stays flat, growth belongs to your brand; when both rise together, the Rising Tide flag activates and category-influenced signals are discounted."}],flags:["Rising tide = TRUE when brand and primary category move same direction AND category moves ≥50% as much as brand.","Rising tide modifier: ×0.90 on this dimension's final score.","Small brand handling (index 0-2): score A on absolute value instead of gap method.","SEMrush volume is display context only — not a scored signal in v1."]},
  listening:{name:"Social Listening",weight:"10% of BVI (Silver tier)",sources:["Meltwater — earned media analytics and competitive SOV report"],principle:"Volume and sentiment together tell the real story. Volume growing while sentiment declines is a Watch signal — audience is talking but not positively.",signals:[{n:"Mention volume vs baseline",w:"35%",s:"Standard % change",note:"Total earned mentions for the calendar month."},{n:"Positive sentiment % vs baseline",w:"35%",s:"Percentage point change",note:"Meltwater sentiment analysis: positive mentions / total mentions × 100."},{n:"Share of voice vs baseline",w:"20%",s:"Percentage point change",note:"Brand mentions / total category mentions × 100."},{n:"Earned reach vs baseline",w:"10%",s:"Standard % change",note:"Meltwater-modeled estimate."}],flags:["Meltwater only captures from the date the query is configured — no historical backfill.","EMV is display-only — not a scored signal."]},
  paid:{name:"Paid Brand Efficiency",weight:"5% of BVI (Silver tier)",sources:["Google Ads — branded campaign CPM and impression share","Meta Ads — branded campaign CPM"],principle:"Rising branded CPM signals either increased demand (positive) or competitor bidding pressure (watch). Impression share distinguishes between the two.",signals:[{n:"Branded CPM Google Ads vs baseline",w:"35%",s:"Percentage point change (inverse)",note:"Lower CPM = more efficient. Inverse scoring."},{n:"Branded CPM Meta Ads vs baseline",w:"25%",s:"Percentage point change (inverse)",note:"Same inverse logic."},{n:"Search impression share vs baseline",w:"25%",s:"Percentage point change",note:"% of eligible impressions your branded ads received."},{n:"Branded paid CTR vs baseline",w:"15%",s:"Percentage point change",note:""}],flags:["Rising CPM + falling impression share = competitor bidding pressure.","Rising CPM + rising impression share = genuine branded demand increase."]},
  awareness:{name:"Direct Awareness",weight:"5% of BVI (Gold tier)",sources:["PDM Survey via Pollfish — quarterly execution"],principle:"The only BVI dimension that directly measures whether people know your brand. Survey data moves slowly and should be interpreted across multiple quarters, not month-to-month.",signals:[{n:"Unaided recall change",w:"40%",s:"Percentage point change",note:"% of cold/prospective audience naming brand unprompted."},{n:"Aided awareness change",w:"25%",s:"Percentage point change",note:"% selecting brand from a recognition list."},{n:"Consideration change",w:"20%",s:"Percentage point change",note:"% who would consider purchasing."},{n:"Preference change",w:"15%",s:"Percentage point change",note:"% selecting brand as first choice in category."}],flags:["Survey is quarterly — carry-forward applies in non-survey months.","Sample size is context only — does not affect BVI score.","Never compare cold/prospective audience recall to existing customer recall."]}
};

const SCALES = [
  {name:"Standard % Change vs Baseline",used:"Impressions, clicks, sessions, reach, views, follower growth",rows:[{r:"+15%+",s:"92"},{r:"+8-15%",s:"80-92"},{r:"+3-8%",s:"68-80"},{r:"0-3%",s:"57-68"},{r:"-3-0%",s:"46-57"},{r:"-8--3%",s:"35-46"},{r:"-15--8%",s:"24-35"},{r:"<-15%",s:"14"}]},

];

    ${spec.flags&&spec.flags.length?`<div style="margin-bottom:16px">
      <div class="label" style="margin-bottom:6px">Flags and edge cases</div>
      ${spec.flags.map(f=>`<div style="display:flex;gap:8px;padding:5px 0;border-bottom:0.5px solid rgba(171,171,171,.15)"><span style="color:#BA7517;font-weight:700;flex-shrink:0">⚑</span><span style="font-size:11px;line-height:1.5">${f}</span></div>`).join("")}

        </div>`).join("")}

  `;
  document.getElementById("modal").classList.remove("hidden");
}
function closeModal() { document.getElementById("modal").classList.add("hidden"); }

// ── TOGGLE DIM ROW ────────────────────────────────────────────────────────────
function toggleDim(dimId) {
  state.expandedDims[dimId] = !state.expandedDims[dimId];
  render();
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function setIdx(i) { state.idx = Math.max(0, Math.min(RAW.length-1, i)); render(); }
function setTier(t) { state.tier = t; render(); }
function setTab(t) { state.tab = t; render(); }

  const isGold = tier==="gold";

    {id:"search",label:"Search demand"},
    {id:"digital",label:"Digital presence"},

    {id:"competitive",label:"Competitive position"},

    ...(isSilver?[{id:"listening",label:"Social listening"}]:[]),
    ...(isSilver?[{id:"paid",label:"Paid brand efficiency"}]:[]),
    ...(isGold?[{id:"awareness",label:"Direct awareness"}]:[]),

  // ── TAB CONTENT

    </div>

    <!-- SIGNAL TABS -->
    <div class="card" style="padding:0;overflow:hidden;margin-bottom:12px">
      <div style="display:flex;border-bottom:0.5px solid rgba(171,171,171,.15);overflow-x:auto">
        ${TABS.map(t=>`<button class="tab-btn${activeTab===t.id?" active":""}" onclick="setTab('${t.id}')">${t.label}</button>`).join("")}
      </div>
      <div style="padding:16px 18px">${tabContent}</div>
    </div>

    <!-- UPSELL (only when not Gold) -->
    ${!isGold?`<div>
      <div class="label" style="margin-bottom:8px">Unlock additional signal dimensions</div>
      <div style="display:grid;grid-template-columns:${isSilver?"1fr":"1fr 1fr 1fr"};gap:10px">
        ${!isSilver?`<div style="border:1px solid rgba(175,170,249,.5);border-radius:8px;padding:14px 16px;background:rgba(175,170,249,.08)"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><span style="font-size:12px;font-weight:700">Social listening + influencer SOV</span><span style="font-size:9px;padding:2px 8px;border-radius:3px;background:#AFAAF9;color:#26215C;font-weight:700">Silver</span></div><p style="font-size:11px;color:#ABABAB;margin:0 0 10px;line-height:1.6">Mention volume, sentiment %, share of voice, earned reach, and EMV from Meltwater.</p><button onclick="setTier('silver')" style="font-size:11px;padding:5px 12px;border-radius:5px;border:0.5px solid #AFAAF9;background:transparent;color:#7756FF;font-weight:600">Preview Silver tier ↗</button></div>`:""}
        ${!isSilver?`<div style="border:1px solid rgba(175,170,249,.5);border-radius:8px;padding:14px 16px;background:rgba(175,170,249,.08)"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><span style="font-size:12px;font-weight:700">Paid brand efficiency</span><span style="font-size:9px;padding:2px 8px;border-radius:3px;background:#AFAAF9;color:#26215C;font-weight:700">Silver</span></div><p style="font-size:11px;color:#ABABAB;margin:0 0 10px;line-height:1.6">Branded CPM trend across Google Ads and Meta, search impression share, and branded paid CTR.</p><button onclick="setTier('silver')" style="font-size:11px;padding:5px 12px;border-radius:5px;border:0.5px solid #AFAAF9;background:transparent;color:#7756FF;font-weight:600">Preview Silver tier ↗</button></div>`:""}
        <div style="border:1px solid rgba(227,255,67,.4);border-radius:8px;padding:14px 16px;background:rgba(227,255,67,.06)"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><span style="font-size:12px;font-weight:700">Direct awareness survey</span><span style="font-size:9px;padding:2px 8px;border-radius:3px;background:#E3FF43;color:#2B2A29;font-weight:700">Gold</span></div><p style="font-size:11px;color:#ABABAB;margin:0 0 10px;line-height:1.6">The only dimension measuring unaided recall and aided awareness directly. PDM-executed quarterly survey via Pollfish.</p><button onclick="setTier('gold')" style="font-size:11px;padding:5px 12px;border-radius:5px;border:0.5px solid #E3FF43;background:transparent;color:#2B2A29;font-weight:600">Preview Gold tier ↗</button></div>
      </div>
    </div>`:""}
  `;
}

function renderMethodology() {
  return `<div>
    <div class="dark-card" style="margin-bottom:14px">
      <div style="font-size:13px;font-weight:700;color:#F5F5F5;margin-bottom:6px">Why brand measurement matters — and why it's hard</div>
      <p style="font-size:12px;color:#ABABAB;line-height:1.65;margin-bottom:8px">Most marketing measurement is built to answer a 7-day question. Brand works on a 12-24 month timescale. The gap between those two clocks is why brand budgets get cut first and justified last.</p>
      <p style="font-size:12px;color:#ABABAB;line-height:1.65">The data below is drawn from published third-party research: Google, Nielsen, Ekimetrics, Kantar, BCG, and McKinsey. The BVI tracks the signals these studies identify as leading indicators of brand health.</p>
    </div>
    <div class="grid4" style="margin-bottom:14px">
      ${[{v:"45%",l:"of CFOs have declined or underfunded marketing proposals that didn't show a clear line to value",s:"McKinsey"},{v:"5-24mo",l:"long-term returns equal those of the first four months — yet most measurement stops at 30 days",s:"Ekimetrics, Google"},{v:"2×",l:"the prices strong brands command vs. weak brands in the same category without losing volume",s:"Kantar / Google, 2024"},{v:"$1.85",l:"required to recover $1 of market share lost through a brand spend cut",s:"BCG brand impact analysis"}].map(s=>`<div class="card"><div style="font-size:24px;font-weight:700;color:#7756FF;line-height:1">${s.v}</div><div style="font-size:11px;color:#2B2A29;line-height:1.5;margin:6px 0">${s.l}</div><div style="font-size:10px;color:#ABABAB;opacity:.7">${s.s}</div></div>`).join("")}
    </div>
    <div class="grid2" style="margin-bottom:14px">
      ${[{color:"#7756FF",title:"Long-term carryover",text:"Marketing returns in months 5-24 equal those of the first four months. Stop measuring at 30 days and you've accounted for half the value created.",stat:"Months 5-24 = Months 0-4",src:"Ekimetrics meta-analysis, 36+ studies"},{color:"#AFAAF9",title:"Brand amplifies performance",text:"A 1% increase in brand awareness drives +0.4% short-term and +0.6% long-term sales simultaneously. Brand and performance reinforce each other.",stat:"+1% awareness → +1% total sales",src:"Nielsen MMM, 20 CPG brands, Google"},{color:"#E3FF43",title:"Pricing power",text:"Strong brands command up to 2× the price of weak brands. Moving toward brand-building communication reduces price elasticity by up to 20%.",stat:"Up to 2× price premium",src:"Kantar, UK / DE, 2024"},{color:"#ABABAB",title:"The cost of cutting",text:"Brands risk losing 2% of future revenue per quarter they stop advertising. Recovery takes 3-5 years and costs $1.85 for every $1 saved.",stat:"$1.85 to recover $1 saved",src:"BCG / Nielsen / Google-Ipsos MMA"}].map(m=>`<div class="card" style="border-left:3px solid ${m.color}"><div style="font-size:12px;font-weight:700;margin-bottom:6px">${m.title}</div><p style="font-size:11px;color:#ABABAB;line-height:1.6;margin-bottom:8px">${m.text}</p><div style="display:flex;align-items:center;justify-content:space-between"><span style="font-size:11px;font-weight:700">${m.stat}</span><span style="font-size:10px;color:#ABABAB;opacity:.7;text-align:right;max-width:160px">${m.src}</span></div></div>`).join("")}
    </div>
    <div style="background:#7756FF;border-radius:8px;padding:16px 18px">
      <div style="font-size:12px;font-weight:700;color:#F5F5F5;margin-bottom:8px">What the BVI measures — and what it doesn't</div>
      <div class="grid3">
        ${[{label:"Reliably tracks",color:"#5DCAA5",text:"Direction of brand health over 6-12 months. Whether you're outpacing the category or riding it. Relative competitive position."},{label:"Measures with caveats",color:"#FAC775",text:"Category context (rising-tide vs brand-specific). Survey recall figures. Competitive sentiment from Meltwater."},{label:"Requires MMM layer",color:"#F09595",text:"Exact revenue attribution to brand activity. Long-term carryover ROAS. Pricing power delta. The BVI feeds that model."}].map(c=>`<div style="background:rgba(245,245,245,.1);border-radius:5px;padding:10px 12px;border-top:2px solid ${c.color}"><div style="font-size:10px;font-weight:700;color:${c.color};text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">${c.label}</div><p style="font-size:11px;color:#F5F5F5;line-height:1.6;opacity:.85">${c.text}</p></div>`).join("")}
      </div>
    </div>
  </div>`;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
